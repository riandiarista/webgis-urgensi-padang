<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kontrol Admin - WebGIS Padang</title>
    <script>
    if (sessionStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = "login.html";
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .leaflet-popup-close-button { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <header class="bg-slate-900 text-white h-16 px-8 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <span class="bg-amber-500 text-slate-950 px-2 py-0.5 rounded text-xs font-black">ADMIN LAYER</span>
            <h1 class="text-sm font-bold tracking-wide">Basis Data Atribut Perkembangan Kota Padang</h1>
        </div>
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs font-bold px-4 py-2 rounded-lg transition duration-200">
            ◀ Kembali ke Peta Spasial
        </a>
    </header>

    <main class="max-w-6xl mx-auto my-8 px-4">
        <div class="flex flex-col md:flex-row gap-4 justify-between items-md-center mb-6">
            <div>
                <h2 class="text-xl font-black text-slate-900">Manajemen Atribut Temporal</h2>
                <p class="text-xs text-slate-400">Tambah, ubah, atau hapus indikator berskala BPS per tahun di sini.</p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                <div class="relative w-full sm:w-64 bg-white border border-slate-200 px-3 py-2 rounded-xl shadow-sm flex items-center">
                    <span class="text-slate-400 mr-2 text-xs">🔍</span>
                    <input type="text" id="search-admin" oninput="pemicuCariAdmin()" placeholder="Cari kecamatan atau tahun..." 
                           class="w-full bg-transparent text-xs focus:outline-none text-slate-800 font-medium">
                </div>
                
                <button onclick="bukaFormTambah()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-5 py-2.5 rounded-xl transition duration-200 shadow-md shadow-indigo-600/10 whitespace-nowrap">
                    + Tambah Rekam Data Baru
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-600 text-[11px] uppercase font-bold tracking-wider select-none">
                        <th class="py-4 px-6 cursor-pointer hover:bg-slate-200/70 transition" onclick="pemicuSortAdmin('nama_kecamatan')">Nama Kecamatan <span id="sort-icon-nama_kecamatan">⇅</span></th>
                        <th class="py-4 px-6 cursor-pointer hover:bg-slate-200/70 transition text-center" onclick="pemicuSortAdmin('tahun')">Tahun <span id="sort-icon-tahun">⇅</span></th>
                        <th class="py-4 px-6 cursor-pointer hover:bg-slate-200/70 transition" onclick="pemicuSortAdmin('jumlah_umkm')">Jumlah UMKM (Unit) <span id="sort-icon-jumlah_umkm">⇅</span></th>
                        <th class="py-4 px-6 cursor-pointer hover:bg-slate-200/70 transition" onclick="pemicuSortAdmin('kepadatan_penduduk')">Kepadatan (Jiwa/km²) <span id="sort-icon-kepadatan_penduduk">⇅</span></th>
                        <th class="py-4 px-6 cursor-pointer hover:bg-slate-200/70 transition" onclick="pemicuSortAdmin('persen_jalan_rusak')">% Jalan Rusak <span id="sort-icon-persen_jalan_rusak">⇅</span></th>
                        <th class="py-4 px-6 text-center">Aksi Manajemen</th>
                    </tr>
                </thead>
                <tbody id="tabel-body-admin" class="text-xs divide-y divide-slate-100 font-medium text-slate-700">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modal-crud" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-center items-center">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl border border-slate-200 shadow-2xl">
            <h3 id="modal-title" class="text-base font-black text-slate-900 mb-4">Form Isian Data</h3>
            
            <form id="form-isi-data" onsubmit="simpanDataForm(event)" class="space-y-4">
                <input type="hidden" id="form-id-data">

                <div id="container-select-kecamatan">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Target Kecamatan</label>
                    <select id="form-kecamatan" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-indigo-500">
                        <option value="1">Kuranji</option>
                        <option value="2">Lubuk Kilangan</option>
                        <option value="3">Pauh</option>
                        <option value="4">Padang Selatan</option>
                        <option value="5">Padang Timur</option>
                        <option value="6">Bungus Teluk Kabung</option>
                        <option value="7">Lubuk Begalung</option>
                        <option value="8">Padang Barat</option>
                        <option value="9">Padang Utara</option>
                        <option value="10">Nanggalo</option>
                        <option value="11">Koto Tangah</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Tahun Analisis</label>
                    <input type="number" id="form-tahun" required placeholder="Contoh: 2025" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Jumlah Industri UMKM (Unit)</label>
                    <input type="number" id="form-umkm" required placeholder="Contoh: 4500" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Kepadatan Penduduk (Jiwa/km²)</label>
                    <input type="number" id="form-kepadatan" required placeholder="Contoh: 2500" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Rasio Jalan Rusak (Desimal BPS)</label>
                    <input type="number" step="0.01" id="form-jalan" required placeholder="Contoh jika 25% tulis: 0.25" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-indigo-500">
                </div>

                <div class="flex justify-end gap-2 pt-2 border-t border-slate-100">
                    <button type="button" onclick="tutupModalForm()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold px-4 py-2.5 rounded-xl transition">Batal</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
